services:
  frontend:
    build:
      context: ./frontend
      target: deps
    container_name: stellarwork-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - contract-builder

  contract-builder:
    image: rust:1.81-slim-bookworm
    container_name: stellarwork-contract-builder
    working_dir: /workspace
    volumes:
      - ./contracts:/workspace/contracts
      - cargo-cache:/usr/local/cargo/registry
    command: tail -f /dev/null
    environment:
      - CARGO_NET_GIT_FETCH_WITH_CLI=true

  stellar-quickstart:
    image: stellar/quickstart:soroban-dev@sha256:6c1438d2e8e59c763bb6d7609e25e0f2cb1e7ff02d7cff7de9be5ca1bb6c3f43
    container_name: stellarwork-quickstart
    ports:
      - "8000:8000"
    command: ["--local", "--enable-soroban-rpc"]
    volumes:
      - stellar-data:/opt/stellar

volumes:
  cargo-cache:
  stellar-data:
